name: Workflow

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5        # ✅ updated from v4
        with:
          node-version: '20'              # this is your app's Node version, keep as needed
      - run: npm install
      - run: npm test
